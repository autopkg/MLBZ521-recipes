Description: |
  Downloads the latest updated build of ARCHICAD based on the override-able parameters.

  PRODUCT:  Archicad, BIMx, DDScad Viewer, BIMcloud, DDScad, Archicad Library, MEP Designer
  MAJOR_VERSION tested options are:  20, 21, 22, 23, 24, 25 (newer are expected to work)
  LOCALIZATION options include:  INT (international english, part of many other licenses), AUS, AUT, BRA, CHE, CHI, CZE, FIN, FRA, GER, GRE, HUN, ITA, JPN, KOR, NED, NOR, NZE, POL, POR, RUS, SPA, SWE, TAI, TUR, UKI, UKR, and USA
  EDITION options include:  FULL, SOLO, and START
  PLATFORM options are:  macOS_Universal, macOS_ARM, macOS_intel, Windows
Identifier: com.github.mlbz521.download.ARCHICADPatch-Test
MinimumVersion: "2.3"
Input:
  NAME: ARCHICAD Patch
  PRODUCT: Archicad
  MAJOR_VERSION: 29
  LOCALIZATION: USA
  EDITION: FULL
  PLATFORM: macOS_ARM
Process:
  - Processor: GRAPHISOFTUpdatesURLProvider
    Arguments:
      product: "%PRODUCT%"
      major_version: "%MAJOR_VERSION%"
      localization: "%LOCALIZATION%"
      edition: "%EDITION%"
      platform: "%PLATFORM%"
  - Processor: URLDownloader
    Arguments:
      url: "%url%"
  - Processor: CodeSignatureVerifier
    Arguments:
      input_path: "%pathname%/*.app"
      requirement: identifier "com.graphisoft.installer" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "3E9E9FN277"
  - Processor: EndOfCheckPhase
